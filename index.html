<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Team Comparator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .search-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        #chartContainer {
            margin-top: 30px;
        }
        .prediction {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="homeTeam" placeholder="Enter home team">
        <input type="text" id="awayTeam" placeholder="Enter away team">
    </div>
    <button onclick="compareTeams()">Compare</button>
    <div id="chartContainer">
        <canvas id="statsChart"></canvas>
    </div>
    <div class="prediction" id="prediction"></div>

    <script>
        let myChart = null;

        // Mock data (replace with actual API calls)
        const mockData = {
            'Al Khor SC': {
                wins: 5,
                losses: 3,
                draws: 2,
                goalsFor: 15,
                goalsAgainst: 10,
                injuries: 2,
                cleanSheets: 4,
                redCards: 1,
                position: 4
            },
            'Al-Ahli Doha': {
                wins: 7,
                losses: 2,
                draws: 1,
                goalsFor: 20,
                goalsAgainst: 8,
                injuries: 1,
                cleanSheets: 5,
                redCards: 0,
                position: 2
            }
        };

        function analyzeParameters(home, away) {
            // Simple AI analysis (can be enhanced)
            const homeStrength = (home.wins * 0.3) + (home.cleanSheets * 0.2) + 
                               (home.goalsFor * 0.15) - (home.redCards * 0.1);
            const awayStrength = (away.wins * 0.25) + (away.cleanSheets * 0.2) + 
                               (away.goalsFor * 0.15) - (away.injuries * 0.1);

            const totalGoals = (home.goalsFor + away.goalsFor) / 5;
            const cleanSheetProb = (home.cleanSheets + away.cleanSheets) / 20;

            return {
                winner: homeStrength > awayStrength ? 'Home Team' : 'Away Team',
                goalsOverUnder: totalGoals > 2.5 ? 'Over 2.5' : 'Under 2.5',
                cleanSheet: cleanSheetProb > 0.5 ? 'Yes' : 'No'
            };
        }

        function compareTeams() {
            const homeTeam = document.getElementById('homeTeam').value;
            const awayTeam = document.getElementById('awayTeam').value;

            // Destroy existing chart
            if (myChart) myChart.destroy();

            // Get data (mock implementation)
            const homeData = mockData[homeTeam] || mockData['Al Khor SC'];
            const awayData = mockData[awayTeam] || mockData['Al-Ahli Doha'];

            // Create chart
            const ctx = document.getElementById('statsChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Wins', 'Losses', 'Draws', 'GF', 'GA', 'Injuries', 'CS', 'Red Cards'],
                    datasets: [{
                        label: homeTeam,
                        data: [
                            homeData.wins,
                            homeData.losses,
                            homeData.draws,
                            homeData.goalsFor,
                            homeData.goalsAgainst,
                            homeData.injuries,
                            homeData.cleanSheets,
                            homeData.redCards
                        ],
                        backgroundColor: 'rgba(54, 162, 235, 0.5)'
                    }, {
                        label: awayTeam,
                        data: [
                            awayData.wins,
                            awayData.losses,
                            awayData.draws,
                            awayData.goalsFor,
                            awayData.goalsAgainst,
                            awayData.injuries,
                            awayData.cleanSheets,
                            awayData.redCards
                        ],
                        backgroundColor: 'rgba(255, 99, 132, 0.5)'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // AI Prediction
            const analysis = analyzeParameters(homeData, awayData);
            document.getElementById('prediction').innerHTML = `
                <h3>AI Prediction:</h3>
                <p>1. Winner: ${analysis.winner}</p>
                <p>2. Goals: ${analysis.goalsOverUnder}</p>
                <p>3. Clean Sheet Likely: ${analysis.cleanSheet}</p>
                <p>League Position: ${homeTeam} (${homeData.position}) vs ${awayTeam} (${awayData.position})</p>
            `;
        }
    </script>
</body>
</html>
